<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.O.B M.C Biker Store | Gear & Custom</title>
    <link rel="stylesheet" href="styleindex.css">
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">B.O.B M.C<span> Biker STORE</span></div>
            <ul>
                <li><a href="#home">Inicio</a></li>
                <li><a href="#shop">Tienda</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Ruta y Estilo</h1>
            <p>Elige tu base y personalízala a tu manera.</p>
            <a href="#shop" class="btn">Ver Catálogo</a>
        </div>
    </section>

    <section id="shop" class="products">
        <h2 class="section-title">Armamento Seleccionado</h2>

        <div class="filters">
            <button class="filter-btn active" onclick="filterProducts('all')">Todo</button>
            <button class="filter-btn" onclick="filterProducts('dtf')">Textiles DTF</button>
            <button class="filter-btn" onclick="filterProducts('laser')">Grabado Láser</button>
        </div>

        <div class="product-grid" id="product-container">
            </div>
    </section>

    <div id="cart-floating" class="cart-floating" style="display:none; position: fixed; bottom: 20px; right: 20px; width: 300px; background: var(--gray); border: 2px solid var(--primary); border-radius: 10px; padding: 15px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h3 style="font-family: 'Metal Mania'; color: var(--primary); margin-top: 0;">🛒 Tu Carrito</h3>
    <div id="cart-items" style="max-height: 200px; overflow-y: auto; font-size: 0.8rem; margin-bottom: 15px; color: white;"></div>
    <div style="border-top: 1px solid #444; padding-top: 10px; font-weight: bold; color: white;">
        Total: $<span id="cart-total">0</span> MXN
    </div>
    <button class="btn" onclick="checkoutWhatsApp()" style="width: 100%; margin-top: 10px; font-size: 0.8rem; cursor: pointer;">Enviar Pedido Completo</button>
    <button onclick="toggleCart()" style="background: none; border: none; color: white; cursor: pointer; display: block; width: 100%; margin-top: 5px; font-size: 0.7rem;">Cerrar Vista</button>
</div>

<div onclick="toggleCart()" style="position: fixed; bottom: 20px; left: 20px; background: var(--primary); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; box-shadow: 0 0 10px var(--primary); font-size: 1.5rem;">
    🛒
</div>

<div id="alert-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title">📦 AVISO</h2>
        <p id="modal-message">Tu carrito está vacío.</p>
        <button class="btn" onclick="closeAlertModal()" style="width: 100%;">ENTENDIDO</button>
    </div>
</div>


<div id="checkout-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 450px; text-align: left;">
        <h2 style="text-align: center;">🏁 FINALIZAR PEDIDO</h2>

        <div style="margin-bottom: 15px;">
            <label style="color: var(--primary); display: block; margin-bottom: 5px; font-weight: bold;">Nombre Completo:</label>
            <input type="text" id="client-name" placeholder="Tu nombre" style="width: 100%; padding: 10px; background: #121212; border: 1px solid #444; color: white; border-radius: 5px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="color: var(--primary); display: block; margin-bottom: 5px; font-weight: bold;">Punto de Entrega:</label>
            <select id="delivery-point" style="width: 100%; padding: 10px; background: #121212; border: 1px solid #444; color: white; border-radius: 5px;">
                <option value="Sur">📍 Zona Sur</option>
                <option value="Norte">📍 Zona Norte</option>
                <option value="Oriente">📍 Zona Oriente</option>
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="color: var(--primary); display: block; margin-bottom: 5px; font-weight: bold;">Método de Pago:</label>
            <select id="payment-method" style="width: 100%; padding: 10px; background: #121212; border: 1px solid #444; color: white; border-radius: 5px;">
                <option value="Efectivo">💵 Efectivo (Contra entrega)</option>
                <option value="Transferencia">📱 Transferencia Bancaria</option>
                <option value="Tarjeta">💳 Tarjeta (Link de pago)</option>
            </select>
        </div>

        <button class="btn" onclick="confirmOrder()" style="width: 100%; margin-bottom: 10px;">CONFIRMAR Y ENVIAR</button>
        <button onclick="closeCheckoutModal()" style="background: none; border: none; color: #888; width: 100%; cursor: pointer; font-size: 0.8rem;">CANCELAR</button>
    </div>
</div>
    <script src="scriptindex.js"></script>
</body>
</html>
